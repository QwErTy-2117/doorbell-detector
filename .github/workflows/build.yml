name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk autoconf libtool zip unzip git cython3
          pip3 install buildozer
      - name: Build APK
        run: |
          cd doorbell
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: doorbell/bin/*.apk