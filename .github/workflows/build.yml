name: Build APK
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            openjdk-17-jdk-headless \
            autoconf \
            libtool \
            pkg-config \
            zip \
            unzip \
            git \
            cython3 \
            cmake \
            curl \
            file

      - name: Install buildozer
        run: pip install "buildozer==1.5.0" cython

      - name: Setup Android SDK
        run: |
          mkdir -p ~/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
          mkdir -p ~/android-sdk/cmdline-tools/latest
          cp -r /tmp/cmdline-tools/cmdline-tools/* ~/android-sdk/cmdline-tools/latest/
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses 2>&1 || true
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34" "ndk;26.1.10909125"

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /home/runner/android-sdk
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          cd doorbell
          buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: doorbell/bin/*.apk